info:
  name: get persona by id
  type: http
  seq: 1

http:
  method: GET
  url: http://localhost:8080/api/personas/5
  headers:
    - name: "{{headers-api}}"
      value: "{{user-apiKey}}"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
