info:
  name: add persona
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:8080/api/personas/guardar
  headers:
    - name: "{{headers-api}}"
      value: "{{user-apiKey}}"
  body:
    type: json
    data: |-
      {
        "identificacion": "1106",
        "tipoIdentificacion": "CC",
        "nombres": "Karen S",
        "apellidos": "Cardenas R",
        "correoElectronico": "kscardenasr@ut.edu.co",
        "tipoPersona": "A"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
